aid: reliable-robotics
name: Reliable Robotics
description: >-
  Reliable Robotics is a California-based aerospace company developing
  continuous autopilot and remote piloting systems that retrofit existing
  fixed-wing aircraft for automated and remotely supervised flight across all
  phases (taxi, take-off, cruise, landing). The company has flown automated
  Cessna 208 Caravan demonstrations including a fully uncrewed take-off and
  landing in 2023, and is pursuing FAA Part 23 supplemental type certification
  for its automation system. Reliable Robotics has contracts with the U.S. Air
  Force AFWERX program and the Defense Innovation Unit to evaluate automated
  cargo and ISR missions on platforms including the Cessna 208, and has
  partnered with Textron Aviation on certification work. The company's
  founders are alumni of SpaceX and Tesla autopilot teams. Reliable Robotics
  is partner- and government-gated and does not currently offer public
  consumer or developer APIs.
